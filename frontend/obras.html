<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>QuantiObra - Obras</title><link rel="stylesheet" href="css/style.css"></head><body><div class="layout"><aside class="sidebar"><div class="brand">QuantiObra</div><div class="subtitle">Quantitativos e gestão de obras</div><nav class="nav"><a href="index.html">Dashboard</a><a href="clientes.html">Clientes</a><a class="active" href="obras.html">Obras</a><a href="quantitativos.html">Quantitativos</a><a href="orcamentos.html">Orçamentos</a><a href="relatorios.html">Relatórios</a></nav></aside><main class="content"><div class="topbar"><div><h1>Obras</h1><p class="status">Cadastro e acompanhamento das obras</p></div></div><section class="panel"><h2>Nova Obra</h2><form id="formObra"><div class="form-grid"><label>Cliente<input name="cliente" required></label><label>Nome da obra<input name="nome" required></label><label>Tipo<select name="tipo"><option>Casa</option><option>Prédio</option><option>Galpão</option><option>Reforma</option><option>Comercial</option><option>Industrial</option></select></label><label>Área construída m²<input name="area" type="number" step="0.01"></label><label>Cidade<input name="cidade"></label><label>Endereço<input name="endereco"></label><label>Data de início<input name="inicio" type="date"></label><label>Responsável técnico<input name="responsavel"></label></div><div class="actions"><button class="btn" type="submit">Salvar Obra</button><button class="btn secondary" type="reset">Limpar</button></div></form></section><section class="panel"><h2>Obras cadastradas</h2><div class="empty">A listagem será conectada à API na próxima etapa.</div></section></main></div></body></html>
